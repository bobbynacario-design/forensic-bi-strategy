  <script>
    // window.storage polyfill — mirrors the Claude Cowork API using localStorage
    window.storage = {
      get: function(key) {
        return Promise.resolve(
          localStorage.getItem(key) !== null
            ? { value: localStorage.getItem(key) }
            : null
        );
      },
      set: function(key, value) {
        localStorage.setItem(key, value);
        return Promise.resolve();
      },
      remove: function(key) {
        localStorage.removeItem(key);
        return Promise.resolve();
      }
    };
  </script>

  <!-- Load and transpile the app -->
  <script type="text/babel" src="forensic-bi-strategy-v5.jsx?v=5"></script>
