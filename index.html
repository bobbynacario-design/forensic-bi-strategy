<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forensic BI — Operating System v5</title>

  <!-- React 18 + Babel (no build tools needed) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0D0F14; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    // window.storage polyfill — mirrors the Claude Cowork API using localStorage
    window.storage = {
      get: function(key) {
        return Promise.resolve(
          localStorage.getItem(key) !== null
            ? { value: localStorage.getItem(key) }
            : null
        );
      },
      set: function(key, value) {
        localStorage.setItem(key, value);
        return Promise.resolve();
      },
      remove: function(key) {
        localStorage.removeItem(key);
        return Promise.resolve();
      }
    };
  </script>

  <!-- Load and transpile the app -->
  <script type="text/babel" src="forensic-bi-strategy-v5.jsx"></script>

  <!-- Mount after the component is defined -->
  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('root')).render(
      React.createElement(Strategy)
    );
  </script>
</body>
</html>
